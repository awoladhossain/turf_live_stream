# .golangci.yml
# Compatible with golangci-lint v2
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck       # Checks for unchecked errors in Go code
    - govet          # Reports suspicious constructs (go vet)
    - staticcheck    # Comprehensive static analysis (includes gosimple + stylecheck)
    - unused         # Checks for unused constants, variables, functions, and types
    - revive         # Fast, configurable, extensible Go linter (replaces golint)

formatters:
  enable:
    - goimports      # Manages import grouping and formatting

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
